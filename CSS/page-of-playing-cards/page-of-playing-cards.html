<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link href="styles.css" rel="stylesheet"/>
</head>

<body>
    <main id="playing-cards">
        <div class="card">
            <div class="left spades">
                <span>A</span>
                <span>♠</span>
            </div>
            <div class="middle spades">♠</div>
            <div class="right spades">
                <span>A</span>
                <span>♠</span>
            </div>
        </div>
        <div class="card">
            <div class="left hearts">
                <span>2</span>
                <span>♥</span>
            </div>
            <div class="middle hearts">
                <div class="updside-column">♥</div>
                <div class="downside-column">♥</div>
            </div>
            <div class="right hearts">
                <span>2</span>
                <span>♥</span>
            </div>
        </div>
        <div class="card">
            <div class="left diamonds">
                <span>3</span>
                <span>♦</span>
            </div>
            <div class="middle diamonds">
                <div class="updside-column">♦</div>
                <div class="updside-column">♦</div>
                <div class="updside-column">♦</div>
            </div>
            <div class="right diamonds">
                <span>3</span>
                <span>♦</span>
            </div>
        </div>
        <div class="card">
            <div class="left clubs">
                <span>4</span>
                <span>♣</span>
            </div>
            <div class="middle clubs">
                <div class="updside-row">♣ ♣</div> 
                <div class="downside-row">♣ ♣</div> 
            </div>
            <div class="right clubs">
                <span>4</span>
                <span>♣</span>
            </div>
        </div>
        
    </main>

</body>

</html>
