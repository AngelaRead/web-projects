<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <link href="styles.css" rel="stylesheet"/>
</head>

<body>
    <div class="form-container">
        <form><h2>Contact Us</h2>
                <p><label for="name">Enter Your Name:<input id="name" name="name" type="text" required/></label></p>
                <p><label for="email">Enter Your Email Address:<input id="email" name="email" type="email" required/></label></p>
                <p><label for="message">Enter Your Message:<textarea id="message" name="message" rows="3" cols="30" required></textarea></label></p>
                <button type="submit">Submit</button>
        </form>
    </div>

</body>

</html>
