<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link href="styles.css" rel="stylesheet"/>
</head>
<body>
    <h1>My To-Do List</h1>
    <ul class="todo-list">
        <li class="todo-item">
            <input type="checkbox" id="item1">
            <label for="item1">Morning Yoga Session</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://github.com/AngelaRead/web-projects" target="_blank">Lists of Sessions</a></li>
            </ul>
        </li>
        <li class="todo-item">
            <input type="checkbox" id="item2">
            <label for="item2">Hot Barre Class</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://github.com/AngelaRead/web-projects" target="_blank">Book a Class</a></li>
            </ul>
        </li>
        <li class="todo-item">
            <input type="checkbox" id="item3">
            <label for="item3">Pilates Workout</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://github.com/AngelaRead/web-projects" target="_blank">Workout Video</a></li>
            </ul>
        </li>
        <li class="todo-item">
            <input type="checkbox" id="item4">
            <label for="item4">Meditation & Breathwork</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://github.com/AngelaRead/web-projects" target="_blank">Breathe Instructions</a></li>
            </ul>
        </li>
    </ul>    

</body>

</html>
