<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>
<body>
        <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="https://images.unsplash.com/photo-1573848855919-9abecc93e456?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8ODZ8fGJvb2t8ZW58MHx8MHx8fDA%3D" alt="blank book"/>
        <p>A blank book</p>
        <p>$15.99</p>
    </section>
    <section>
        <h2>Payment Information</h2>
        <form id="checkout">
            <p>
            <label for="card-name">Cardholder Name <span aria-hidden="true">*</span></label>
            <input type="text" name="card-name" id="card-name"required/>
            </p>
            <label for="card-number">Card Number <span aria-hidden="true">*</span></label>
            <input type="text" name="card-number" id="card-number" aria-describedby="card-number-help"required/>
            <p id="card-number-help">Please enter your 16-digit card number without spaces or dashes.</p>
            <p>
            <label for="expiry">Expiry Date <span aria-hidden="true">*</span></label>
            <input type="text" name="card-number-help" id="expiry" placeholder="MM/YY"required/>
            </p>
            <p>
            <label for="cvv">CVV <span aria-hidden="true">*</span></label>
            <input type="text" name="card-number-help" id="cvv"required/>
            </p>
            <p>
            <button aria-describedby="submit">Place order</button>
            </p>
        </form>   
    </section>

</body>

</html>
